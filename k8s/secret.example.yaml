apiVersion: v1
kind: Secret
metadata:
  name: shop-secret
  namespace: shop
type: Opaque
stringData:
  DB_PASSWORD: "请修改为你自己的强密码"
  POSTGRES_PASSWORD: "请修改为你自己的强密码"
  JWT_SECRET_KEY: "请修改为你自己的JWT密钥（至少32字符随机字符串）"
  WECHAT_APP_SECRET: "请修改为你自己的微信小程序AppSecret"
  # 微信支付 — API v3 密钥（32位，从商户平台设置）
  WECHAT_PAY_API_V3_KEY: "请修改为你自己的微信支付APIv3密钥"
  # 微信支付 — 商户API私钥证书（PEM格式，base64编码）
  # 生成命令: base64 -w0 apiclient_key.pem
  WECHAT_PAY_CERT_BASE64: "请修改为你自己的商户证书base64"
  # 这个文件不要提交到公开仓库！建议加到 .gitignore
  # 生产环境应该用 kubectl create secret 命令行创建，不存文件
