apiVersion: v1
kind: Secret
metadata:
  name: shop-secret
  namespace: shop
type: Opaque
stringData:
  DB_PASSWORD: "请修改为你自己的强密码"
  POSTGRES_PASSWORD: "请修改为你自己的强密码"
  JWT_SECRET_KEY: "请修改为你自己的JWT密钥（至少32字符随机字符串）"
  WECHAT_APP_SECRET: "请修改为你自己的微信小程序AppSecret"
  # 这个文件不要提交到公开仓库！建议加到 .gitignore
  # 生产环境应该用 kubectl create secret 命令行创建，不存文件
