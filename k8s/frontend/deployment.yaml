apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-shop-frontend
  labels:
    app: web-shop-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-shop-frontend
  template:
    metadata:
      labels:
        app: web-shop-frontend
    spec:
      containers:
        - name: web-shop-frontend
          image: YOUR_ECR_FRONTEND_URI:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
