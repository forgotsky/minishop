apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-shop-backend
  labels:
    app: web-shop-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-shop-backend
  template:
    metadata:
      labels:
        app: web-shop-backend
    spec:
      containers:
        - name: web-shop-backend
          image: YOUR_ECR_BACKEND_URI:latest
          ports:
            - containerPort: 8000
          env:
            - name: ALLOWED_ORIGINS
              value: "https://shop.yourdomain.com"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
