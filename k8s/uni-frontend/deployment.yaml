apiVersion: apps/v1
kind: Deployment
metadata:
  name: uni-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: uni-frontend
  template:
    metadata:
      labels:
        app: uni-frontend
    spec:
      containers:
        - name: uni-frontend
          image: your-registry/uni-frontend:latest
          ports:
            - containerPort: 80
