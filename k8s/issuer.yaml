# Let's Encrypt 证书颁发者
# 等 cert-manager 安装完成后再 apply 这个文件
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # Let's Encrypt 生产环境 API
    server: https://acme-v02.api.letsencrypt.org/directory
    email: forgotsky@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - http01:
          ingress:
            class: traefik
