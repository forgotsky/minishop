name: CD — Deploy to K3s

on:
  push:
    branches: [main]

jobs:
  # ============================================================
  # 阶段 1：测试
  # ============================================================
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          pytest --tb=short --disable-warnings || echo "⚠️  No tests found"

  # ============================================================
  # 阶段 2：构建镜像 → 推送 GitHub Container Registry
  # ============================================================
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write      # 允许推送 GHCR
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # ============================================================
  # 阶段 3：部署到 K3s 服务器
  # ============================================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/shop-app

            # 拉取最新 k8s 配置
            git pull origin main

            # 逐个应用 k8s 清单（跳过 secret.example.yaml，真正的 Secret 由初始化脚本创建）
            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/configmap.yaml
            kubectl apply -f k8s/postgres.yaml
            kubectl apply -f k8s/app.yaml
            kubectl apply -f k8s/ingress.yaml

            # 更新 FastAPI 应用的镜像版本（触发滚动更新）
            kubectl set image deployment/shop-app \
              shop-app=ghcr.io/${{ github.repository }}:${{ github.sha }} \
              -n shop

            # 等待滚动更新完成（新 Pod 就绪后才关旧 Pod，零停机）
            kubectl rollout status deployment/shop-app -n shop --timeout=120s

            # 显示当前 Pod 状态
            kubectl get pods -n shop
