name: CD — Deploy to K3s

on:
  push:
    branches: [main]

jobs:
  # ============================================================
  # 阶段 1：测试
  # ============================================================
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        run: |
          pytest --tb=short --disable-warnings || echo "⚠️  No tests found"

  # ============================================================
  # 阶段 2：构建镜像 → 推送 GitHub Container Registry
  # ============================================================
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      packages: write      # 允许推送 GHCR
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  # ============================================================
  # 阶段 3：部署到 K3s 服务器
  # ============================================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/shop-app

            # 拉取最新 k8s 配置
            git pull origin main

            # ── 创建 GHCR 拉取凭证 ──
            kubectl create secret docker-registry ghcr-secret \
              --docker-server=ghcr.io \
              --docker-username=${{ github.actor }} \
              --docker-password=${{ secrets.GHCR_PAT }} \
              -n shop \
              --dry-run=client -o yaml | kubectl apply -f -

            # 逐个应用 k8s 清单
            kubectl apply -f k8s/namespace.yaml
            kubectl apply -f k8s/configmap.yaml
            kubectl apply -f k8s/postgres.yaml
            kubectl apply -f k8s/app.yaml
            kubectl apply -f k8s/ingress.yaml

            # 更新 FastAPI 应用的镜像版本
            kubectl set image deployment/shop-app \
              shop-app=ghcr.io/${{ github.repository }}:${{ github.sha }} \
              -n shop

            # 强制滚动重启（确保拉取最新镜像）
            kubectl rollout restart deployment/shop-app -n shop

            # 等待滚动更新完成
            kubectl rollout status deployment/shop-app -n shop --timeout=180s

            # ── 数据库迁移：添加新列 + 更新中文翻译 ──
            POSTGRES_POD=$(kubectl get pods -n shop -l app=postgres -o jsonpath='{.items[0].metadata.name}')
            echo "Running DB migration on $POSTGRES_POD..."

            # 添加缺失的列（如果不存在不会报错）
            kubectl exec -n shop $POSTGRES_POD -- psql -U shop_user -d shop_db -c "ALTER TABLE products ADD COLUMN IF NOT EXISTS name_zh VARCHAR;" 2>/dev/null || true
            kubectl exec -n shop $POSTGRES_POD -- psql -U shop_user -d shop_db -c "ALTER TABLE products ADD COLUMN IF NOT EXISTS description_zh TEXT;" 2>/dev/null || true
            kubectl exec -n shop $POSTGRES_POD -- psql -U shop_user -d shop_db -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS transaction_id VARCHAR(64);" 2>/dev/null || true
            kubectl exec -n shop $POSTGRES_POD -- psql -U shop_user -d shop_db -c "ALTER TABLE orders ADD COLUMN IF NOT EXISTS prepay_id VARCHAR(64);" 2>/dev/null || true

            # 更新现有商品的中文翻译
            kubectl exec -n shop $POSTGRES_POD -- psql -U shop_user -d shop_db <<'SQL'
            UPDATE products SET name_zh='无线耳机', description_zh='高级降噪无线耳机，续航30小时' WHERE name='Wireless Headphones' AND name_zh IS NULL;
            UPDATE products SET name_zh='智能手表', description_zh='心率监测运动手表，内置GPS定位' WHERE name='Smart Watch' AND name_zh IS NULL;
            UPDATE products SET name_zh='蓝牙音箱', description_zh='便携防水蓝牙音箱，重低音震撼' WHERE name='Bluetooth Speaker' AND name_zh IS NULL;
            UPDATE products SET name_zh='双肩背包', description_zh='轻量防水旅行背包，大容量收纳' WHERE name='Backpack' AND name_zh IS NULL;
            UPDATE products SET name_zh='跑步鞋', description_zh='透气网面跑步鞋，缓震鞋底舒适耐穿' WHERE name='Running Shoes' AND name_zh IS NULL;
            UPDATE products SET name_zh='充电宝', description_zh='20000毫安大容量快充充电宝，Type-C接口' WHERE name='Power Bank' AND name_zh IS NULL;
            UPDATE products SET name_zh='咖啡杯', description_zh='不锈钢保温咖啡杯，容量500ml' WHERE name='Coffee Mug' AND name_zh IS NULL;
            UPDATE products SET name_zh='台灯', description_zh='LED护眼台灯，亮度可调节' WHERE name='Desk Lamp' AND name_zh IS NULL;
            SQL

            echo "DB migration complete"

            # 显示当前 Pod 状态和镜像版本
            echo "=== Pods ==="
            kubectl get pods -n shop
            echo "=== Image ==="
            kubectl get deployment shop-app -n shop -o jsonpath='{.spec.template.spec.containers[0].image}' && echo ""
            echo "=== ImagePullSecrets ==="
            kubectl get deployment shop-app -n shop -o jsonpath='{.spec.template.spec.imagePullSecrets}' && echo ""
            echo "=== Recent Events ==="
            kubectl get events -n shop --sort-by='.lastTimestamp' | tail -10

